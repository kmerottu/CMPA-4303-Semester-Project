<!DOCTYPE html>
<html lang="en">
<head>
   <link rel="stylesheet" href="styles.css"> 
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>

<body>

<header>
    <h1>Hawk Eye Photography</h1>
    <nav>
        <a href="index.html">Home</a> |
        <a href="about.html">About</a> |
        <a href="gallery.html">Gallery</a>
    </nav>
</header>

<!-- Filter Buttons -->
<div class="filters">
    <button onclick="filterImages('all', this)" class="active">All</button>
    <button onclick="filterImages('astro', this)">Astro Photography</button>
    <button onclick="filterImages('marching', this)">Marching Band Photography</button>
    <button onclick="filterImages('landscape', this)">Landscape Photography</button>
</div>

<!-- Gallery -->
<div class="gallery">

    <div class="gallery-item astro">
        <img src="images/photo1.jpg">
    </div>

    <div class="gallery-item marching">
        <img src="images/photo2.jpg">
    </div>

    <div class="gallery-item landscape">
        <img src="images/photo3.jpg">
    </div>

    <div class="gallery-item astro">
        <img src="images/photo4.jpg">
    </div>

    <div class="gallery-item marching">
        <img src="images/photo5.jpg">
    </div>

</div>

<script>
function filterImages(category, btn) {
    let items = document.getElementsByClassName("gallery-item");

    for (let i = 0; i < items.length; i++) {
        if (category === "all") {
            items[i].style.display = "block";
        } else {
            if (items[i].classList.contains(category)) {
                items[i].style.display = "block";
            } else {
                items[i].style.display = "none";
            }
        }
    }

    let buttons = document.querySelectorAll(".filters button");
    buttons.forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
}
</script>

</body>
</html>
